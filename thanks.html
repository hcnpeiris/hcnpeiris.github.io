<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Message Received</title>
    <link href="./style.css" rel="stylesheet">
</head>

<body class="bg-white flex flex-col min-h-screen font-sans antialiased">

    <main class="flex-grow flex items-center justify-center px-6">
        <div class="max-w-md w-full text-center">

            <div class="mb-8 inline-flex items-center justify-center w-16 h-16 rounded-full bg-[#111111]">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="#fb923c" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                </svg>
            </div>

            <h1 class="text-3xl font-bold text-gray-900 tracking-tight mb-4">
                Message Received.
            </h1>

            <p class="text-gray-500 text-[0.95rem] leading-relaxed mb-8">
                Thank you for reaching out. I've received your details and will personally review your project
                requirements. Expect a response <span class="font-semibold text-gray-900">within 24 hours</span>.
            </p>

            <a href="/"
                class="inline-flex items-center gap-2.5 bg-[#111111] text-orange-400 text-[0.82rem] font-semibold tracking-wide rounded-full px-8 py-3 hover:bg-[#2a2a2a] transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
                Back to Home
            </a>
        </div>
    </main>

    <footer class="py-10 text-center border-t bg-[#fafafa] border-gray-200">
        <p class="text-[0.68rem] font-semibold tracking-widest text-gray-400 uppercase">
            &copy; 2026 HCN Peiris • All Rights Reserved
        </p>
    </footer>

</body>

</html>
